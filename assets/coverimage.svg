<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400px" height="600px">
<rect width="400" height="600" fill="#050a14"/>
<defs>
  <radialGradient id="glow" cx="50%" cy="42%" r="72%">
    <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.28"/>
    <stop offset="60%" stop-color="#0066aa" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#050a14" stop-opacity="0"/>
  </radialGradient>
  <filter id="neon" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.03"/>
    <stop offset="50%" stop-color="#00f0ff" stop-opacity="0.0"/>
    <stop offset="100%" stop-color="#00f0ff" stop-opacity="0.03"/>
  </linearGradient>
</defs>
<rect width="400" height="600" fill="url(#glow)"/>
<!-- grid (retro) -->
<line x1="0" y1="0" x2="0" y2="600" stroke="#0a2040" stroke-width="0.4"/>
<line x1="40" y1="0" x2="40" y2="600" stroke="#0a2040" stroke-width="0.4"/>
<line x1="80" y1="0" x2="80" y2="600" stroke="#0a2040" stroke-width="0.4"/>
<line x1="120" y1="0" x2="120" y2="600" stroke="#0a2040" stroke-width="0.4"/>
<line x1="160" y1="0" x2="160" y2="600" stroke="#0a2040" stroke-width="0.4"/>
<line x1="200" y1="0" x2="200" y2="600" stroke="#0a2040" stroke-width="0.4"/>
<line x1="240" y1="0" x2="240" y2="600" stroke="#0a2040" stroke-width="0.4"/>
<line x1="280" y1="0" x2="280" y2="600" stroke="#0a2040" stroke-width="0.4"/>
<line x1="320" y1="0" x2="320" y2="600" stroke="#0a2040" stroke-width="0.4"/>
<line x1="360" y1="0" x2="360" y2="600" stroke="#0a2040" stroke-width="0.4"/>
<line x1="400" y1="0" x2="400" y2="600" stroke="#0a2040" stroke-width="0.4"/>
<line x1="0" y1="0" x2="400" y2="0" stroke="#0a2040" stroke-width="0.4"/>
<line x1="0" y1="40" x2="400" y2="40" stroke="#0a2040" stroke-width="0.4"/>
<line x1="0" y1="80" x2="400" y2="80" stroke="#0a2040" stroke-width="0.4"/>
<line x1="0" y1="120" x2="400" y2="120" stroke="#0a2040" stroke-width="0.4"/>
<line x1="0" y1="160" x2="400" y2="160" stroke="#0a2040" stroke-width="0.4"/>
<line x1="0" y1="200" x2="400" y2="200" stroke="#0a2040" stroke-width="0.4"/>
<line x1="0" y1="240" x2="400" y2="240" stroke="#0a2040" stroke-width="0.4"/>
<line x1="0" y1="280" x2="400" y2="280" stroke="#0a2040" stroke-width="0.4"/>
<line x1="0" y1="320" x2="400" y2="320" stroke="#0a2040" stroke-width="0.4"/>
<line x1="0" y1="360" x2="400" y2="360" stroke="#0a2040" stroke-width="0.4"/>
<line x1="0" y1="400" x2="400" y2="400" stroke="#0a2040" stroke-width="0.4"/>
<line x1="0" y1="440" x2="400" y2="440" stroke="#0a2040" stroke-width="0.4"/>
<line x1="0" y1="480" x2="400" y2="480" stroke="#0a2040" stroke-width="0.4"/>
<line x1="0" y1="520" x2="400" y2="520" stroke="#0a2040" stroke-width="0.4"/>
<line x1="0" y1="560" x2="400" y2="560" stroke="#0a2040" stroke-width="0.4"/>
<line x1="0" y1="600" x2="400" y2="600" stroke="#0a2040" stroke-width="0.4"/>
<rect width="400" height="600" fill="url(#scan)"/>
<!-- outer ward boundary -->
<circle cx="200" cy="230" r="112" stroke="#00f0ff" stroke-width="1.6"
        fill="none" stroke-dasharray="5 4" opacity="0.55" filter="url(#neon)"/>
<circle cx="200" cy="230" r="83" stroke="#00f0ff" stroke-width="0.9"
        fill="none" opacity="0.35"/>
<!-- core loop (the pattern) -->
<path d="M 200 143 C 264 143, 289 192, 289 232 C 289 282, 258 320, 200 320
   C 145 320, 116 282, 116 238 C 116 194, 142 158, 194 151
   C 242 144, 278 183, 284 226"
      stroke="#00f0ff" stroke-width="2.4" fill="none" filter="url(#neon)"/>
<!-- escape arc -->
<path d="M 284 226 C 312 238, 320 270, 302 294"
      stroke="#00f0ff" stroke-width="2.4" fill="none" opacity="0.85" filter="url(#neon)"/>
<circle cx="200" cy="230" r="5.5" fill="#00f0ff" opacity="0.95" filter="url(#neon)"/>
<circle cx="200" cy="230" r="14" fill="none" stroke="#00f0ff" stroke-width="0.6" opacity="0.35"/>
<!-- halo -->
<ellipse cx="200" cy="488" rx="120" ry="14" fill="#00f0ff" opacity="0.07"/>
<!-- title -->
<text x="200" y="528" text-anchor="middle"
      font-family="Courier New, monospace" font-size="15px"
      fill="#00f0ff" opacity="0.92" letter-spacing="4" filter="url(#neon)">
  TASK-AVOIDANCE WARDS</text>
<!-- author -->
<text x="200" y="556" text-anchor="middle"
      font-family="Courier New, monospace" font-size="13px"
      fill="#00d4ff" opacity="0.88" letter-spacing="2" filter="url(#neon)">
  ZADDY</text>
<text x="200" y="578" text-anchor="middle"
      font-family="Courier New, monospace" font-size="9px"
      fill="#0099cc" opacity="0.75" letter-spacing="3">
  +++ multiverselib-collectives +++</text>
<!-- corner marks -->
<path d="M 34 50 L 34 34 L 50 34" stroke="#00f0ff" stroke-width="1.2" fill="none" opacity="0.6"/>
<path d="M 366 50 L 366 34 L 350 34" stroke="#00f0ff" stroke-width="1.2" fill="none" opacity="0.6"/>
<path d="M 34 566 L 34 582 L 50 582" stroke="#00f0ff" stroke-width="1.2" fill="none" opacity="0.6"/>
<path d="M 366 566 L 366 582 L 350 582" stroke="#00f0ff" stroke-width="1.2" fill="none" opacity="0.6"/>
</svg>